<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인형뽑기 아카이브 - Home</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: 둥근모꼴 및 Noto Sans KR -->
  <link rel="stylesheet" href="https://cdn.tailwindcss.com/gh/projectnoonnu/noonfonts_2105_2@1.0/DungGeunMo.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /* 전체 스크롤을 막아 드래그 도중 화면이 움직이는 현상을 완벽히 차단 */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f7f9fa;
      color: #1a1a1a;
    }

    .font-retro {
      font-family: 'DungGeunMo', monospace;
    }

    /* 연노랑 빔 네온 폰트 스타일 */
    .retro-neon-title {
      font-family: 'DungGeunMo', monospace;
      color: #fffa80; /* 밝은 연노랑 */
      text-shadow: 
        -2px -2px 0 #fff,  
         2px -2px 0 #fff,
        -2px  2px 0 #fff,
         2px  2px 0 #fff,
         0 0 8px rgba(255, 42, 141, 0.9),  /* 핫핑크 네온 광채 */
         0 0 20px rgba(255, 42, 141, 0.7),
         0 0 35px rgba(255, 42, 141, 0.5);
    }

    /* 드래그 가능한 스티커 스타일 */
    .drag-sticker {
      cursor: grab;
      user-select: none;
      touch-action: none;
      z-index: 10;
    }
    .drag-sticker:active {
      cursor: grabbing;
      z-index: 50;
    }
  </style>
</head>
<body class="selection:bg-pink-100">

  <!-- 
    ========================================================================
    [COPY-PASTE START] 확정된 네비게이션 컴포넌트를 그대로 적용했습니다.
    ========================================================================
  -->
  <header class="fixed top-0 left-0 w-full h-[64px] bg-white/90 backdrop-blur-md border-b border-gray-100 z-[100] px-6 flex items-center">
    <div class="max-w-7xl mx-auto w-full flex justify-between items-center relative">
      
      <!-- 로고 영역 -->
      <a href="home.html" class="font-retro text-xl tracking-wider text-gray-800 select-none hover:opacity-80 transition-opacity">
        🧸 archive
      </a>
      
      <!-- 데스크톱 네비게이션 메뉴 (md 이상에서만 노출) -->
      <nav class="hidden md:flex space-x-8 text-sm font-semibold text-gray-500">
        <!-- data-page 속성에 매칭될 파일명을 적어두면 스크립트가 알아서 활성화 해줍니다. -->
        <a href="home.html" data-page="home" class="nav-item py-1.5 border-b-2 border-transparent hover:text-pink-500 transition-all">Home</a>
        <a href="showcase.html" data-page="showcase" class="nav-item py-1.5 border-b-2 border-transparent hover:text-pink-500 transition-all">Showcase</a>
        <a href="tour.html" data-page="tour" class="nav-item py-1.5 border-b-2 border-transparent hover:text-pink-500 transition-all">Shop Tour</a>
        <a href="tips.html" data-page="tips" class="nav-item py-1.5 border-b-2 border-transparent hover:text-pink-500 transition-all">Tips</a>
        <a href="play.html" data-page="play" class="nav-item py-1.5 border-b-2 border-transparent hover:text-pink-500 transition-all">Play Simulator</a>
      </nav>

      <!-- 모바일용 햄버거 토글 버튼 (md 미만에서 노출) -->
      <button id="custom-hamburger-btn" class="md:hidden text-gray-600 focus:outline-none p-1.5 hover:bg-gray-50 rounded-lg transition-colors" aria-label="메뉴 토글">
        <svg class="w-6 h-6 transition-transform duration-300" id="hamburger-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <!-- 기본 삼선 아이콘 -->
          <path id="hamburger-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>

      <!-- 모바일 오버레이 풀다운 메뉴 -->
      <div id="custom-mobile-menu" class="hidden absolute top-[48px] right-0 w-52 bg-white border border-gray-100 rounded-2xl flex flex-col p-3 space-y-1 shadow-xl md:hidden z-50">
        <a href="home.html" data-page="home" class="mobile-nav-item text-gray-600 font-semibold text-sm px-4 py-2.5 rounded-xl hover:bg-pink-50 hover:text-pink-500 transition-all">Home</a>
        <a href="showcase.html" data-page="showcase" class="mobile-nav-item text-gray-600 font-semibold text-sm px-4 py-2.5 rounded-xl hover:bg-pink-50 hover:text-pink-500 transition-all">Showcase</a>
        <a href="tour.html" data-page="tour" class="mobile-nav-item text-gray-600 font-semibold text-sm px-4 py-2.5 rounded-xl hover:bg-pink-50 hover:text-pink-500 transition-all">Shop Tour</a>
        <a href="tips.html" data-page="tips" class="mobile-nav-item text-gray-600 font-semibold text-sm px-4 py-2.5 rounded-xl hover:bg-pink-50 hover:text-pink-500 transition-all">Tips</a>
        <a href="play.html" data-page="play" class="mobile-nav-item text-gray-600 font-semibold text-sm px-4 py-2.5 rounded-xl hover:bg-pink-50 hover:text-pink-500 transition-all">Play Simulator</a>
      </div>
    </div>
  </header>
  <!-- 
    ========================================================================
    [COPY-PASTE END] 여기까지가 컴포넌트 영역입니다.
    ========================================================================
  -->

  <!-- 메인 스티커 보드 영역 -->
  <main class="relative w-full h-[calc(100vh-64px)] mt-[64px] overflow-hidden select-none bg-[#f7f9fa]">
    <!-- 배경 다이어리 도트 패턴 -->
    <div class="absolute inset-0 bg-[radial-gradient(#ffd5e5_1px,transparent_1px)] [background-size:24px_24px] opacity-60 pointer-events-none"></div>

    <!-- 센터 타이틀 -->
    <div class="text-center z-10 px-4 mt-12 md:mt-16 relative pointer-events-none">
      <h1 class="retro-neon-title text-5xl md:text-7xl tracking-wide mb-3 select-none">인형뽑기 archive</h1>
      <p class="text-xs text-gray-400 font-retro tracking-widest mt-2 uppercase">drag the stickers & find the joy</p>
    </div>

    <!-- 스티커 배치 캔버스 (각 인형들과 키치 별들이 한층 더 커진 크기로 자연스럽게 레이아웃 구성) -->
    <div class="absolute inset-0 w-full h-full pointer-events-none">
      
      <!-- 1. 핑구 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 25%; left: 6%; transform: rotate(-8deg); width: 155px;">
        <img src="image-removebg-preview.png" alt="핑구" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 2. 치이카와 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 26%; right: 8%; transform: rotate(10deg); width: 145px;">
        <img src="인형_곰팅.png" alt="치이카와" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 3. 키티 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 45%; left: 12%; transform: rotate(-15deg); width: 130px;">
        <img src="인형_키티.png" alt="키티" class="w-full h-auto object-contain rounded-2xl pointer-events-none">
      </div>

      <!-- 4. 한교곰 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 43%; right: 12%; transform: rotate(15deg); width: 130px;">
        <img src="인형_한교곰.png" alt="한교곰" class="w-full h-auto object-contain rounded-2xl pointer-events-none">
      </div>

      <!-- 5. 만두 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 35%; left: 38%; transform: rotate(5deg); width: 115px;">
        <img src="인형_만두.png" alt="만두" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 6. 루피시계 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 55%; left: 32%; transform: rotate(-8deg); width: 145px;">
        <img src="인형_루피시계.png" alt="루피시계" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 7. 베개인형 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 66%; left: 8%; transform: rotate(12deg); width: 130px;">
        <img src="인형_시노부.png" alt="베개인형" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 8. 우사기 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 64%; right: 10%; transform: rotate(-12deg); width: 135px;">
        <img src="인형_우사기.png" alt="우사기" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 9. 시계 (jpg <=> png 자동 복구 에러핸들러 탑재) -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 55%; right: 28%; transform: rotate(-5deg); width: 145px;">
        <img src="인형_시계.jpg" alt="시계" class="w-full h-auto object-contain pointer-events-none" onerror="if(this.src.indexOf('.jpg') !== -1) this.src=this.src.replace('.jpg', '.png');">
      </div>

      <!-- 10. 바나나 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 72%; left: 45%; transform: rotate(8deg); width: 125px;">
        <img src="인형_바나나.png" alt="바나나" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 데코용 키치 별 1 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 22%; left: 30%; transform: rotate(15deg); width: 70px;">
        <img src="인형_별1.png" alt="별1" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 데코용 키치 별 2 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 48%; right: 40%; transform: rotate(-20deg); width: 65px;">
        <img src="인형_별2.png" alt="별2" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 데코용 키치 별 3 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 20%; right: 28%; transform: rotate(8deg); width: 60px;">
        <img src="인형_별3.png" alt="별3" class="w-full h-auto object-contain pointer-events-none">
      </div>

      <!-- 데코용 키치 별 4 -->
      <div class="drag-sticker absolute pointer-events-auto" style="top: 60%; left: 24%; transform: rotate(-12deg); width: 65px;">
        <img src="인형_별4.png" alt="별4" class="w-full h-auto object-contain pointer-events-none">
      </div>

    </div>
  </main>

  <!-- 
    ========================================================================
    [네비게이션 작동용 필수 자바스크립트 코드 - 복사본 유지]
    ========================================================================
  -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const hamburgerBtn = document.getElementById("custom-hamburger-btn");
      const mobileMenu = document.getElementById("custom-mobile-menu");
      const hamburgerPath = document.getElementById("hamburger-path");

      // 1. 모바일 햄버거 토글 열기 / 닫기 기능
      hamburgerBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        mobileMenu.classList.toggle("hidden");
        
        // 아이콘을 햄버거(☰) <=> X 마크로 교체
        if (mobileMenu.classList.contains("hidden")) {
          hamburgerPath.setAttribute("d", "M4 6h16M4 12h16M4 18h16");
        } else {
          hamburgerPath.setAttribute("d", "M6 18L18 6M6 6l12 12");
        }
      });

      // 바깥 영역 클릭 시 모바일 메뉴 자동으로 닫기
      document.addEventListener("click", function (e) {
        if (!mobileMenu.classList.contains("hidden") && !hamburgerBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
          mobileMenu.classList.add("hidden");
          hamburgerPath.setAttribute("d", "M4 6h16M4 12h16M4 18h16");
        }
      });

      // 2. [핵심] 현재 접속한 페이지 자동 활성화 감지 시스템
      const path = window.location.pathname;
      let currentPageName = path.split("/").pop();
      
      if (currentPageName === "" || currentPageName === "index.html") {
        currentPageName = "home.html";
      }

      const activeKey = currentPageName.replace(".html", "");

      // 데스크톱 링크 활성화 하이라이트 부여
      const desktopItems = document.querySelectorAll(".nav-item");
      desktopItems.forEach(item => {
        if (item.getAttribute("data-page") === activeKey) {
          item.classList.add("text-pink-500", "border-pink-500");
          item.classList.remove("text-gray-500", "border-transparent");
        }
      });

      // 모바일 링크 활성화 하이라이트 부여
      const mobileItems = document.querySelectorAll(".mobile-nav-item");
      mobileItems.forEach(item => {
        if (item.getAttribute("data-page") === activeKey) {
          item.classList.add("bg-pink-50", "text-pink-500");
          item.classList.remove("text-gray-600");
        }
      });
    });
  </script>

  <!-- 드래그 앤 드롭 구현 스크립트 (위치 뒤틀림 보정 및 모바일 완벽 호환) -->
  <script>
    const stickers = document.querySelectorAll('.drag-sticker');

    stickers.forEach(sticker => {
      let isDragging = false;
      let startX, startY;
      let currentX = 0;
      let currentY = 0;

      const transform = sticker.style.transform;
      let initialRotation = "";
      if (transform) {
        initialRotation = transform; // 'rotate(Xdeg)'
      }

      sticker.addEventListener('mousedown', startDrag);
      sticker.addEventListener('touchstart', startDrag, { passive: false });

      function startDrag(e) {
        isDragging = true;
        const event = e.touches ? e.touches[0] : e;
        
        startX = event.clientX - currentX;
        startY = event.clientY - currentY;

        sticker.style.transition = "none";

        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', endDrag);
        document.addEventListener('touchmove', onDrag, { passive: false });
        document.addEventListener('touchend', endDrag);
      }

      function onDrag(e) {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault();
        
        const event = e.touches ? e.touches[0] : e;
        currentX = event.clientX - startX;
        currentY = event.clientY - startY;

        sticker.style.transform = `translate(${currentX}px, ${currentY}px) ${initialRotation}`;
      }

      function endDrag() {
        isDragging = false;
        sticker.style.transition = "transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', endDrag);
        document.removeEventListener('touchmove', onDrag);
        document.removeEventListener('touchend', endDrag);
      }
    });
  </script>
</body>
</html>
